<svg xmlns="http://www.w3.org/2000/svg" width="960" height="700" viewBox="0 0 960 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#57606A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="700" rx="14" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text x="480" y="42" text-anchor="middle" font-size="19" font-weight="600" fill="#1F2328">LendIQ — System Architecture</text>
  <text x="480" y="64" text-anchor="middle" font-size="12.5" fill="#57606A">The LLM orchestrates and explains · deterministic systems compute · every answer carries sources</text>

  <!-- CLIENT LAYER -->
  <rect x="40" y="84" width="880" height="76" rx="10" fill="#FAFBFC" stroke="#E1E4E8"/>
  <text x="54" y="102" font-size="10.5" font-weight="600" fill="#8A929A" letter-spacing="1">CLIENT</text>
  <rect x="200" y="98" width="330" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
  <text x="365" y="118" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2C2C2A">Streamlit UI</text>
  <text x="365" y="136" text-anchor="middle" font-size="12" fill="#5F5E5A">Chat · sources panel · briefing · approvals</text>
  <rect x="570" y="98" width="200" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
  <text x="670" y="118" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2C2C2A">REST clients</text>
  <text x="670" y="136" text-anchor="middle" font-size="12" fill="#5F5E5A">POST /chat · GET /briefing</text>

  <line x1="480" y1="160" x2="480" y2="184" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- API LAYER -->
  <rect x="40" y="188" width="880" height="76" rx="10" fill="#FAFBFC" stroke="#E1E4E8"/>
  <text x="54" y="206" font-size="10.5" font-weight="600" fill="#8A929A" letter-spacing="1">API</text>
  <rect x="200" y="202" width="570" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
  <text x="485" y="222" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2C2C2A">FastAPI gateway</text>
  <text x="485" y="240" text-anchor="middle" font-size="12" fill="#5F5E5A">Pydantic request/response models · trace IDs · latency middleware · structured audit log</text>

  <line x1="480" y1="264" x2="480" y2="288" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ORCHESTRATION LAYER -->
  <rect x="40" y="292" width="880" height="76" rx="10" fill="#FAFBFC" stroke="#E1E4E8"/>
  <text x="54" y="310" font-size="10.5" font-weight="600" fill="#8A929A" letter-spacing="1">ORCHESTRATION</text>
  <rect x="200" y="306" width="570" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="485" y="326" text-anchor="middle" font-size="13.5" font-weight="600" fill="#26215C">LangGraph router</text>
  <text x="485" y="344" text-anchor="middle" font-size="12" fill="#534AB7">One structured LLM call → SQL | RAG | LOCATE | BRIEFING | REJECT · confidence &lt; 0.6 → clarify</text>

  <line x1="128" y1="368" x2="128" y2="392" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="304" y1="368" x2="304" y2="392" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="480" y1="368" x2="480" y2="392" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="656" y1="368" x2="656" y2="392" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="832" y1="368" x2="832" y2="392" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>

  <!-- AGENT LAYER -->
  <rect x="40" y="396" width="880" height="106" rx="10" fill="#FAFBFC" stroke="#E1E4E8"/>
  <text x="54" y="414" font-size="10.5" font-weight="600" fill="#8A929A" letter-spacing="1">AGENTS</text>

  <rect x="48" y="422" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="128" y="443" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">SQL analyst</text>
  <text x="128" y="461" text-anchor="middle" font-size="11.5" fill="#185FA5">NL → guarded SELECT</text>
  <text x="128" y="477" text-anchor="middle" font-size="11.5" fill="#185FA5">deterministic validator</text>

  <rect x="224" y="422" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="304" y="443" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Contract RAG</text>
  <text x="304" y="461" text-anchor="middle" font-size="11.5" fill="#185FA5">top-k clause retrieval</text>
  <text x="304" y="477" text-anchor="middle" font-size="11.5" fill="#185FA5">[Doc §Clause] citations</text>

  <rect x="400" y="422" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="480" y="443" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Locate workflow</text>
  <text x="480" y="461" text-anchor="middle" font-size="11.5" fill="#185FA5">rules engine decides</text>
  <text x="480" y="477" text-anchor="middle" font-size="11.5" fill="#185FA5">LLM drafts reply only</text>

  <rect x="576" y="422" width="160" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="656" y="443" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Briefing generator</text>
  <text x="656" y="461" text-anchor="middle" font-size="11.5" fill="#185FA5">4 canned queries</text>
  <text x="656" y="477" text-anchor="middle" font-size="11.5" fill="#185FA5">LLM summarizes</text>

  <rect x="752" y="422" width="160" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="832" y="443" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Safe reject</text>
  <text x="832" y="461" text-anchor="middle" font-size="11.5" fill="#993C1D">no tools touched</text>
  <text x="832" y="477" text-anchor="middle" font-size="11.5" fill="#993C1D">capability message</text>

  <line x1="128" y1="502" x2="128" y2="526" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="304" y1="502" x2="304" y2="526" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="480" y1="502" x2="480" y2="526" stroke="#57606A" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M656 502 L656 514 L150 514 L150 526" fill="none" stroke="#57606A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- GROUNDING LAYER -->
  <rect x="40" y="530" width="880" height="96" rx="10" fill="#FAFBFC" stroke="#E1E4E8"/>
  <text x="54" y="548" font-size="10.5" font-weight="600" fill="#8A929A" letter-spacing="1">GROUNDING</text>

  <rect x="48" y="558" width="200" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="148" y="579" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">SQLite → PostgreSQL</text>
  <text x="148" y="597" text-anchor="middle" font-size="11.5" fill="#0F6E56">lending book · read-only conn</text>

  <rect x="268" y="558" width="200" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="368" y="579" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">ChromaDB</text>
  <text x="368" y="597" text-anchor="middle" font-size="11.5" fill="#0F6E56">GMSLA clauses · bge-small</text>

  <rect x="488" y="558" width="200" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="588" y="579" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Rules engine</text>
  <text x="588" y="597" text-anchor="middle" font-size="11.5" fill="#0F6E56">pure Python · unit-tested</text>

  <rect x="708" y="558" width="204" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="810" y="579" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Anthropic API</text>
  <text x="810" y="597" text-anchor="middle" font-size="11.5" fill="#534AB7">language only · never arithmetic</text>

  <text x="480" y="662" text-anchor="middle" font-size="12.5" fill="#57606A">Hallucination defense: tool-grounding → citation contract (sources[]) → groundedness eval — every numeric claim must exist in tool output</text>
  <text x="480" y="682" text-anchor="middle" font-size="11.5" fill="#8A929A">Synthetic data only · human approval gate on high-value locates · SQL agent is SELECT-only on an allowlist</text>
</svg>
